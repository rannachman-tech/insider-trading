name: Ingest EDGAR Form 4 (daily)
on:
  schedule:
    - cron: "0 23 * * 1-5" # 23:00 UTC weekdays — well after US market close
  workflow_dispatch: {}

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm install --no-audit --no-fund
      - name: Ingest live EDGAR Form 4 filings
        env:
          EDGAR_CONTACT: ${{ secrets.EDGAR_CONTACT || 'ranna@etoro.com' }}
          # Tuned for tight Actions minute budgets — only pull yesterday's
          # filings (history accumulates across runs anyway). Bump these
          # back up to 5 days / 6,000 once you confirm runners allocate.
          EDGAR_DAYS: "1"
          EDGAR_MAX: "1500"
        run: npm run ingest
      - name: Commit snapshot if changed
        run: |
          if [[ -n "$(git status --porcelain data/insider-snapshot.json)" ]]; then
            git config user.name "compass-bot"
            git config user.email "bot@compass.etoro.com"
            git add data/insider-snapshot.json
            git commit -m "data: refresh insider snapshot (auto)"
            git push
          else
            echo "No changes to snapshot"
          fi
